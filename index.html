    var t = e.target;

    var r = t.getBoundingClientRect();
    hoverBox.style.display = 'block';
    hoverBox.style.left = r.left + 'px'; hoverBox.style.top = r.top + 'px';
    hoverBox.style.width = r.width + 'px'; hoverBox.style.height = r.height + 'px';
  }

  // ---- overlap cycling --------------------------------------------------
  var lastKey = null, lastIdx = 0;
  function stackAt(x, y) {
    var els = document.elementsFromPoint(x, y) || [];
    return Array.prototype.filter.call(els, function (el) {
      return el && el.nodeType === 1 && !isUi(el) && el !== document.documentElement && el !== document.body;
    });
  }
  function cycleAt(x, y) {
    var stack = stackAt(x, y); if (!stack.length) return;
    var key = Math.round(x) + ',' + Math.round(y);
    if (key === lastKey) lastIdx = (lastIdx + 1) % stack.length; else { lastKey = key; lastIdx = 0; }
    select(stack[lastIdx]);
  }

  // ---- pointer handlers (custom dblclick detection) --------------------
  var lastClickTime = 0, lastClickTarget = null;
  function onClickCapture(e) {
    if (!editMode) return;
    var t = e.target;
    if (isUi(t)) return;
    if (t && t.isContentEditable) return;
    e.preventDefault(); e.stopPropagation();
    if (e.altKey) { cycleAt(e.clientX, e.clientY); lastClickTarget = null; return; }
    var now = Date.now(), isLeaf = t && t.nodeType === 1 && t.children.length === 0;
    if (isLeaf && t === lastClickTarget && (now - lastClickTime) < 450) {
      lastClickTarget = null; lastClickTime = 0; startInlineEdit(t); return;
    }
    lastClickTime = now; lastClickTarget = t;
    if (t && t.nodeType === 1) select(t);
  }
  function onDblClick(e) {
    if (!editMode) return;
    var t = e.target;
    if (!t || t.nodeType !== 1 || isUi(t) || t.isContentEditable) return;
    if (t.children.length === 0) { e.preventDefault(); e.stopPropagation(); startInlineEdit(t); }
  }
  function onContextMenu(e) {
    if (!editMode) return;
    if (isUi(e.target)) return;
    e.preventDefault(); cycleAt(e.clientX, e.clientY);
  }

  // ---- keyboard ---------------------------------------------------------
  function onKeyDown(e) {
    if (!editMode || editingEl) return;
    var mod = e.ctrlKey || e.metaKey;
    if (mod && e.key.toLowerCase() === 'z') { e.preventDefault(); if (e.shiftKey) redo(); else undo(); return; }
    if (mod && e.key.toLowerCase() === 'y') { e.preventDefault(); redo(); return; }
    if (!selected) return;
    if (e.key === 'Delete' || e.key === 'Backspace') { e.preventDefault(); deleteSelected(); return; }
    if (e.key.indexOf('Arrow') === 0) { e.preventDefault(); nudge(e.key, e.shiftKey ? 10 : 1); return; }
    if (e.key === 'Escape') { deselect(); }
  }

  function onScrollResize() { positionSelBox(); }

  function setEditMode(on) {
    editMode = on;
    if (!panel) buildPanel();
    ensureHoverBox(); ensureSelBox();
    panel.style.display = on ? 'block' : 'none';
    document.documentElement.style.cursor = on ? 'crosshair' : '';
    if (on) {
      document.addEventListener('mousemove', onMouseMove, true);
      document.addEventListener('dblclick', onDblClick, true);
      document.addEventListener('contextmenu', onContextMenu, true);
      document.addEventListener('keydown', onKeyDown, true);
      window.addEventListener('scroll', onScrollResize, true);
      window.addEventListener('resize', onScrollResize, true);
    } else {
      document.removeEventListener('mousemove', onMouseMove, true);
      document.removeEventListener('dblclick', onDblClick, true);
      document.removeEventListener('contextmenu', onContextMenu, true);
      document.removeEventListener('keydown', onKeyDown, true);
      window.removeEventListener('scroll', onScrollResize, true);
      window.removeEventListener('resize', onScrollResize, true);
      if (editingEl) editingEl.blur();
      if (hoverBox) hoverBox.style.display = 'none';
      deselect();
    }
  }

  // ---- messaging --------------------------------------------------------
  window.addEventListener('message', function (e) {
    var d = e.data || {};
    if (d.type === 'AISD_CANVAS_SET_MODE') setEditMode(!!d.enabled);
    else if (d.type === 'AISD_CANVAS_REQUEST_SAVE') {
      if (editingEl) editingEl.blur();
      var arr = Object.keys(overrides).map(function (k) { return overrides[k]; }).filter(hasEdits);
      notifyParent('AISD_CANVAS_SAVE_DATA', { overrides: arr });
    }
  });

  document.addEventListener('click', onClickCapture, true);

  // ---- reapply on DOM changes ------------------------------------------
  var reTimer = null;
  function scheduleReapply() {
    if (editMode || applying) return;
    if (!Object.keys(overrides).length) return;
    clearTimeout(reTimer); reTimer = setTimeout(renderOverrides, 120);
  }

  // ---- init -------------------------------------------------------------
  function init() {
    loadPersisted();
    renderOverrides();
    history = [cloneOverrides()]; hidx = 0;
    try {
      var mo = new MutationObserver(scheduleReapply);
      mo.observe(document.documentElement, { childList: true, subtree: true, characterData: true });
    } catch (e) { /* unsupported */ }
    setTimeout(renderOverrides, 400);
    notifyParent('AISD_CANVAS_READY', {});
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
